name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: mihoyo-widget-x86_64-linux
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: mihoyo-widget-x86_64-windows
            ext: ".exe"
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: mihoyo-widget-aarch64-macos
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf libssl-dev
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build frontend
        run: |
          cd packages/frontend
          npm ci
          npm run build
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked
      - name: Build Tauri app
        working-directory: apps/desktop
        run: cargo tauri build --verbose
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: apps/desktop/target/release/bundle/
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts
          merge-multiple: true
      - name: Generate release body
        run: |
          awk -v ver="${TAG#v}" '
            $0 ~ "^# " ver " " {found=1; next}
            found && /^# / {exit}
            found {print}
          ' CHANGELOG.md > /tmp/release-body.md
        env:
          TAG: ${{ github.ref_name }}
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-body.md
          files: /tmp/artifacts/
